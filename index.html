<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Generador M3U SATIPTV</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      max-width: 1000px;
    }
    textarea {
      width: 100%;
      height: 450px;
      font-family: monospace;
      font-size: 13px;
    }
    button {
      margin-top: 10px;
      margin-right: 10px;
      padding: 10px 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Generador M3U SATIPTV</h1>
  <p><b>Total de IPs:</b> <span id="total">0</span></p>

  <textarea id="output" readonly></textarea>
  <br>
  <button id="copyBtn">Copiar resultado</button>
  <button id="downloadBtn">Descargar .m3u</button>

  <script>
    async function cargarArchivo(ruta) {
      const res = await fetch(ruta + "?v=" + Date.now());
      if (!res.ok) {
        throw new Error("No se pudo cargar " + ruta + " (HTTP " + res.status + ")");
      }
      return await res.text();
    }

    function descargarM3U(contenido, nombre = "lista.m3u") {
      const blob = new Blob([contenido], { type: "audio/x-mpegurl" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = nombre;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function iniciar() {
      try {
        const ipsText = await cargarArchivo("ips.txt");
        const baseText = await cargarArchivo("base.txt");

        const ips = ipsText
          .split(/\r?\n/)
          .map(x => x.trim())
          .filter(Boolean);

        let resultado = "#EXTM3U\n";

        for (const ip of ips) {
          resultado += baseText.replace(/IP/g, ip) + "\n";
        }

        document.getElementById("total").textContent = ips.length;
        document.getElementById("output").value = resultado;

        // Descarga automática al generar
        descargarM3U(resultado);
      } catch (e) {
        document.getElementById("output").value = "Error: " + e.message;
        console.error(e);
      }
    }

    document.getElementById("copyBtn").addEventListener("click", async () => {
      await navigator.clipboard.writeText(document.getElementById("output").value);
    });

    document.getElementById("downloadBtn").addEventListener("click", () => {
      descargarM3U(document.getElementById("output").value);
    });

    iniciar();
  </script>
</body>
</html>
