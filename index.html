<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SATIPTV Player</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial,sans-serif;
}

.app{
  display:grid;
  grid-template-columns:320px 1fr;
  height:100vh;
}

.sidebar{
  background:#1b1b1b;
  overflow-y:auto;
  padding:12px;
}

.player{
  padding:15px;
}

#search{
  width:100%;
  padding:10px;
  box-sizing:border-box;
  margin-bottom:10px;
}

.channel{
  padding:10px;
  margin-bottom:5px;
  background:#2c2c2c;
  border-radius:6px;
  cursor:pointer;
}

.channel:hover{
  background:#444;
}

video{
  width:100%;
  max-height:75vh;
  background:black;
}

#status{
  margin-top:10px;
  color:#bbb;
  word-break:break-all;
}
</style>

</head>

<body>

<div class="app">

  <div class="sidebar">
    <h2>Canales</h2>

    <input
      id="search"
      placeholder="Buscar canal..."
    >

    <div id="channels"></div>
  </div>

  <div class="player">

    <h1 id="title">
      SATIPTV
    </h1>

    <video
      id="video"
      controls
      autoplay
      muted
    ></video>

    <div id="status"></div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>

<script>

const WORKER_URL =
"https://satiptv.javgr77.workers.dev/";

let channels = [];
let player = null;

async function loadList(){

  const res =
    await fetch(
      WORKER_URL + "?v=" + Date.now(),
      {
        cache:"no-store"
      }
    );

  if(!res.ok){
    throw new Error(
      "No se pudo cargar la lista"
    );
  }

  const text =
    await res.text();

  parseM3U(text);

  renderChannels(channels);

  if(channels.length){
    playChannel(channels[0]);
  }
}

function parseM3U(text){

  const lines =
    text
      .split(/\r?\n/)
      .map(x=>x.trim())
      .filter(Boolean);

  channels = [];

  for(let i=0;i<lines.length;i++){

    if(
      lines[i].startsWith("#EXTINF")
    ){

      const name =
        lines[i]
          .split(",")
          .pop()
          .trim();

      const url =
        lines[i+1];

      if(
        url &&
        url.startsWith("http")
      ){

        channels.push({
          name,
          url
        });

      }

    }

  }

}

function renderChannels(list){

  const box =
    document.getElementById(
      "channels"
    );

  box.innerHTML = "";

  list.forEach(channel=>{

    const div =
      document.createElement(
        "div"
      );

    div.className =
      "channel";

    div.textContent =
      channel.name;

    div.onclick =
      ()=>playChannel(channel);

    box.appendChild(div);

  });

}

function playChannel(channel){

  const video =
    document.getElementById(
      "video"
    );

  const title =
    document.getElementById(
      "title"
    );

  const status =
    document.getElementById(
      "status"
    );

  title.textContent =
    channel.name;

  status.textContent =
    channel.url;

  if(player){

    player.destroy();

    player = null;

  }

  if(
    window.mpegts &&
    mpegts.getFeatureList()
      .mseLivePlayback
  ){

    player =
      mpegts.createPlayer({

        type:"mpegts",

        isLive:true,

        url:channel.url

      });

    player.attachMediaElement(
      video
    );

    player.load();

    player.play();

  }
  else{

    video.src =
      channel.url;

    video.play();

  }

}

document
.getElementById("search")
.addEventListener(
  "input",
  e=>{

    const q =
      e.target.value
        .toLowerCase();

    const filtered =
      channels.filter(
        c=>
        c.name
          .toLowerCase()
          .includes(q)
      );

    renderChannels(
      filtered
    );

  }
);

loadList()
.catch(err=>{

  document
    .getElementById(
      "status"
    )
    .textContent =
      err.message;

});

</script>

</body>
</html>
