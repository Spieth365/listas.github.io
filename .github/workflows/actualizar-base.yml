name: Actualizar base SATIPTV

on:
  workflow_dispatch:

  schedule:
    - cron: "17 */6 * * *"

  push:
    paths:
      - "scripts/actualizar_base.py"
      - ".github/workflows/actualizar-base.yml"

permissions:
  contents: write

jobs:
  actualizar-base:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generar base.txt
        run: python scripts/actualizar_base.py

      - name: Comprobar cambios
        id: cambios
        shell: bash
        run: |
          if git diff --quiet -- base.txt; then
            echo "hay_cambios=false" >> "$GITHUB_OUTPUT"
          else
            echo "hay_cambios=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Guardar nuevo base.txt
        if: steps.cambios.outputs.hay_cambios == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add base.txt
          git commit -m "Actualizar base.txt automáticamente"
          git push

      - name: Sin cambios
        if: steps.cambios.outputs.hay_cambios == 'false'
        run: echo "base.txt ya estaba actualizado."
